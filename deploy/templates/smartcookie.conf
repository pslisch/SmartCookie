# deploy/templates/smartcookie.conf - Apache virtualhost reverse proxy template
# DOMAIN_PLACEHOLDER is replaced dynamically during the installation step.

<VirtualHost *:80>
    ServerName DOMAIN_PLACEHOLDER
    ServerAlias www.DOMAIN_PLACEHOLDER

    # Preserve host header for upstream proxy matching
    ProxyPreserveHost On
    ProxyRequests Off

    # Explicitly bypass ACME Let's Encrypt challenges so Apache serves them locally
    ProxyPass /.well-known/acme-challenge/ !

    # Reverse proxy incoming requests to SmartCookie Node.js server (running on 3000)
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Secure HTTP Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    # Custom Logging
    ErrorLog ${APACHE_LOG_DIR}/smartcookie_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcookie_access.log combined
</VirtualHost>
